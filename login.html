<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SynkronyAI</title>
    <!-- Vinculamos el CSS centralizado -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 50px; 
            background-color: #0A0A10; 
            color: #F0F0F5; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-wrapper { 
            max-width: 400px; 
            width: 100%;
            background: #14141d; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { 
            margin-top: 0; 
            color: #0077FF; 
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #B0B0C4; font-size: 0.9rem; }
        input { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #303040; 
            background: #0A0A10; 
            color: white; 
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #0077FF; }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(90deg, #0077FF, #9F40FF); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        
        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
        }
        .footer-links a { color: #0077FF; text-decoration: none; }
        .footer-links a:hover { text-decoration: underline; }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
        }

</head>
<body>
    <div class="login-wrapper">
        <!-- RUTA CORREGIDA: Apunta a la carpeta auth/ -->
        <form action="auth/login_process.php" method="POST">
            <h2>Acceso SynkronyAI</h2>
            
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Entrar al Sistema</button>
        </form>

        <div class="footer-links">
