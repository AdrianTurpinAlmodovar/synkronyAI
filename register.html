<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - SynkronyAI</title>
    <!-- Vinculamos el CSS centralizado -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 50px; 
            background-color: #0A0A10; 
            color: #F0F0F5; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .register-wrapper { 
            max-width: 450px; 
            width: 100%;
            background: #14141d; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { 
            margin-top: 0; 
            color: #9F40FF; 
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #B0B0C4; font-size: 0.85rem; }
        input { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #303040; 
            background: #0A0A10; 
            color: white; 
            box-sizing: border-box;
            font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: #9F40FF; }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(90deg, #9F40FF, #0077FF); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1rem;
            margin-top: 15px;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .footer-links a { color: #0077FF; text-decoration: none; }
        .footer-links a:hover { text-decoration: underline; }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <!-- RUTA CORREGIDA: Apunta a la carpeta auth/ -->
        <form action="auth/register_process.php" method="POST">
            <h2>Crear Cuenta</h2>
            
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" name="name" placeholder="Tu nombre" required>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>

            <div class="form-group">
                <label>Confirmar Contraseña</label>
                <input type="password" name="confirm_password" placeholder="Repite tu contraseña" required>
            </div>

            <button type="submit">Registrarme Ahora</button>
        </form>

        <div class="footer-links">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>
        
        <a href="index.php" class="back-link">← Volver a la Home</a>
    </div>
</body>
</html>
